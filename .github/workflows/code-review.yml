name: Agentic Code Review

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run remote reviewer (Cursor)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTIC_CODE_REVIEWERS_ENGINE: cursor-sdk
          AGENTIC_CODE_REVIEWERS_MODEL: composer-2.5
        shell: bash
        run: |
          set -o pipefail
          git checkout -B "${{ github.head_ref }}"
          curl -fsSL https://raw.githubusercontent.com/jpolvora/agentic-code-reviewers/main/run.sh | bash -s -- \
            --gh \
            --source-branch "refs/heads/${{ github.head_ref }}" \
            --target-branch "refs/heads/${{ github.base_ref }}"
