name: Cursor Code Review

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Reviewer (Dry-Run)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          NO_COLOR: 1
        shell: bash
        run: |
          set -o pipefail
          curl -fsSL https://raw.githubusercontent.com/jpolvora/cursor-reviewer/main/run.sh | bash -s -- \
            --dry-run \
            --source-branch "refs/heads/${{ github.head_ref }}" \
            --target-branch "refs/heads/${{ github.base_ref }}" | tee review-output.txt

      - name: Post Comments to GitHub PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            if (!fs.existsSync('review-output.txt')) {
              console.log("No review-output.txt found.");
              return;
            }

            const logContent = fs.readFileSync('review-output.txt', 'utf8');

            function extractJson(text) {
              const JSON_BLOCK_PATTERN = /```(?:json)?\s*([\s\S]*?)```/gi;
              const matches = Array.from(text.matchAll(JSON_BLOCK_PATTERN));
              for (let i = matches.length - 1; i >= 0; i--) {
                const candidate = matches[i][1].trim();
                try {
                  const parsed = JSON.parse(candidate);
                  if (parsed && (parsed.reviews || parsed.resolvedThreads)) {
                    return parsed;
                  }
                } catch (e) {}
              }

              // Fallback
              const startIdx = text.indexOf('{\n  "reviews"');
              if (startIdx !== -1) {
                let depth = 0;
                for (let i = startIdx; i < text.length; i++) {
                  if (text[i] === '{') depth++;
                  else if (text[i] === '}') {
                    depth--;
                    if (depth === 0) {
                      const candidate = text.slice(startIdx, i + 1);
                      try {
                        const parsed = JSON.parse(candidate);
                        if (parsed && (parsed.reviews || parsed.resolvedThreads)) {
                          return parsed;
                        }
                      } catch (e) {}
                    }
                  }
                }
              }
              return null;
            }

            const parsed = extractJson(logContent);
            if (!parsed) {
              console.log("Failed to extract JSON from reviewer logs.");
              return;
            }

            if (!parsed.reviews || parsed.reviews.length === 0) {
              console.log("No reviews found in output JSON.");
              return;
            }

            console.log(`Parsed ${parsed.reviews.length} reviews from agent.`);

            const comments = parsed.reviews.map(review => {
              let body = `### [Cursor Reviewer] ${review.severity.toUpperCase()}\n\n${review.comment}`;
              if (review.analysis) {
                body += `\n\n**Analysis:**\n${review.analysis}`;
              }
              if (review.suggestedFix) {
                body += `\n\n**Suggested Fix:**\n${review.suggestedFix}`;
              }
              return {
                path: review.fileName,
                line: review.lineNumber,
                side: 'RIGHT',
                body: body
              };
            });

            const pull_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commit_id = context.payload.pull_request.head.sha;

            console.log(`Creating PR review for PR #${pull_number} on commit ${commit_id}...`);

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              commit_id,
              event: 'COMMENT',
              body: parsed.reviewSummary || 'Cursor Reviewer has scanned the PR and found some potential issues.',
              comments: comments
            });
