name: Agentic Auto Fix

on:
  workflow_run:
    workflows: ["Agentic Code Review"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    concurrency:
      group: auto-fix-${{ github.event.workflow_run.pull_requests[0].number || github.event.inputs.pr_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Extract PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN || github.token }}
        run: |
          PN="${{ github.event.workflow_run.pull_requests[0].number }}"
          HB="${{ github.event.workflow_run.pull_requests[0].head.ref }}"
          BB="${{ github.event.workflow_run.pull_requests[0].base.ref }}"
          if [ -z "$PN" ] || [ "$PN" = "null" ]; then
            PN="${{ github.event.inputs.pr_number }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            JSON=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0]')
            PN=$(echo "$JSON" | jq -r '.number')
            HB=$(echo "$JSON" | jq -r '.head.ref')
            BB=$(echo "$JSON" | jq -r '.base.ref')
          fi
          echo "pr_number=$PN" >> "$GITHUB_OUTPUT"
          echo "source_branch=$HB" >> "$GITHUB_OUTPUT"
          echo "target_branch=$BB" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.source_branch }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check for active threads
        id: check-threads
        env:
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN || github.token }}
        run: |
          ACTIVE=$(node .agents/skills/solve-pr/scripts/fetch_threads.cjs ${{ steps.pr-info.outputs.pr_number }} --json 2>/dev/null | jq '.activeThreads | length' || echo 0)
          echo "Active threads: $ACTIVE"
          echo "active_threads_count=$ACTIVE" >> "$GITHUB_OUTPUT"

      - name: Run auto-fix
        if: ${{ steps.check-threads.outputs.active_threads_count != '0' }}
        env:
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN || github.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          git checkout -B "${{ steps.pr-info.outputs.source_branch }}"
          curl -fsSL https://raw.githubusercontent.com/jpolvora/agentic-code-reviewers/release/run.sh | bash -s -- \
            --engine opencode --model opencode-go/deepseek-v4-flash \
            --gh \
            --pr-id "${{ steps.pr-info.outputs.pr_number }}" \
            --source-branch "refs/heads/${{ steps.pr-info.outputs.source_branch }}" \
            --target-branch "refs/heads/${{ steps.pr-info.outputs.target_branch }}" \
            --auto-fix
