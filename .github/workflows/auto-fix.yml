name: Agentic Auto Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
        type: string
      head_ref:
        description: 'Head branch ref'
        required: true
        type: string
      base_ref:
        description: 'Base branch ref'
        required: true
        type: string
      iteration:
        description: 'Current loop iteration (from code-review)'
        required: true
        type: string
        default: '1'

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: auto-fix-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
      HEAD_REF: ${{ github.event.inputs.head_ref }}
      BASE_REF: ${{ github.event.inputs.base_ref }}
      ITERATION: ${{ github.event.inputs.iteration }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Capture HEAD before fix
        id: before
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Check for active threads
        id: check-threads
        env:
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN }}
        run: |
          ACTIVE_THREADS=$(node .agents/skills/solve-pr/scripts/fetch_threads.cjs $PR_NUMBER --json | jq '.activeThreads | length')
          echo "active_threads_count=$ACTIVE_THREADS" >> $GITHUB_OUTPUT
          echo "Active threads: $ACTIVE_THREADS"

      - name: Run Auto-Fix
        id: autofix
        if: ${{ steps.check-threads.outputs.active_threads_count != '0' }}
        env:
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN }}
          AGENTIC_CODE_REVIEWERS_ENGINE: opencode
          AGENTIC_CODE_REVIEWERS_MODEL: opencode-go/deepseek-v4-flash
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          git checkout -B "$HEAD_REF"
          curl -fsSL https://raw.githubusercontent.com/jpolvora/agentic-code-reviewers/main/run.sh | bash -s -- \
            --gh \
            --pr-id "$PR_NUMBER" \
            --source-branch "refs/heads/$HEAD_REF" \
            --target-branch "refs/heads/$BASE_REF" \
            --auto-fix

      - name: Detect if fixes were applied and dispatch next review
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          BEFORE_SHA="${{ steps.before.outputs.sha }}"

          if [ "$CURRENT_SHA" != "$BEFORE_SHA" ]; then
            echo "Auto-fix applied changes ($BEFORE_SHA -> $CURRENT_SHA)."

            # Still have active threads after fix? Check before dispatching.
            ACTIVE_THREADS=$(node .agents/skills/solve-pr/scripts/fetch_threads.cjs $PR_NUMBER --json | jq '.activeThreads | length')
            echo "Active threads after fix: $ACTIVE_THREADS"

            if [ "$ACTIVE_THREADS" -gt 0 ]; then
              NEXT_ITER=$((ITERATION + 1))
              echo "Dispatching next code-review (iteration $NEXT_ITER)..."
              gh workflow run "Agentic Code Review" \
                --ref "$HEAD_REF" \
                -f pr_number="$PR_NUMBER" \
                -f head_ref="$HEAD_REF" \
                -f base_ref="$BASE_REF" \
                -f iteration="$NEXT_ITER"
            else
              echo "All threads resolved. Loop complete."
            fi
          else
            echo "Auto-fix did not produce any changes. Stopping loop."
          fi
